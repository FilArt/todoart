name: Android Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Optional notes stored with the uploaded APK release
        required: false
        type: string
  push:
    paths:
      - "app/**"
      - ".github/workflows/android-release.yml"
    tags:
      - "v*"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      TODOART_API_BASE_URL: ${{ secrets.TODOART_API_BASE_URL }}
      TODOART_RELEASE_UPLOAD_TOKEN: ${{ secrets.TODOART_RELEASE_UPLOAD_TOKEN }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_notes || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Read app version
        id: app_version
        run: |
          version_line="$(grep '^version:' app/pubspec.yaml | awk '{print $2}')"
          build_name="${version_line%%+*}"
          build_number="${version_line##*+}"

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches pubspec version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          test "$tag_version" = "${{ steps.app_version.outputs.build_name }}"

      - name: Write Android signing config
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          keystore_path="$RUNNER_TEMP/todoart-upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          cat > app/android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=$keystore_path
          EOF

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release --dart-define=TODO_API_BASE_URL="$TODOART_API_BASE_URL"

      - name: Store APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: todoart-android-${{ steps.app_version.outputs.build_name }}-${{ steps.app_version.outputs.build_number }}
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK to TodoArt API
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        run: |
          api_base="${TODOART_API_BASE_URL%/}"
          curl --fail --show-error --silent \
            -X POST \
            -H "X-Release-Token: $TODOART_RELEASE_UPLOAD_TOKEN" \
            --form-string "version=${{ steps.app_version.outputs.build_name }}" \
            --form-string "build_number=${{ steps.app_version.outputs.build_number }}" \
            --form-string "notes=$RELEASE_NOTES" \
            -F "apk=@app/build/app/outputs/flutter-apk/app-release.apk;type=application/vnd.android.package-archive" \
            "$api_base/releases/android"
